name: Julia + Wrapper CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GFE_CORE_LIB: ${{ github.workspace }}/code/c++ core/build-shared/libgfe_core.so

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - name: Build shared C++ core
        run: |
          cmake -S "code/c++ core" -B "code/c++ core/build-shared" -DBUILD_SHARED_LIBS=ON
          cmake --build "code/c++ core/build-shared" -j

      - name: Run Python wrapper tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          pytest -q code/python/tests

      - name: Install dependencies
        working-directory: code/julia
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Run tests
        working-directory: code/julia
        run: julia --project=. src/test/runtests.jl
