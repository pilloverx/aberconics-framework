name: Julia CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - name: Install dependencies
        working-directory: code/julia
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Run tests
        working-directory: code/julia
        run: julia --project=. src/test/runtests.jl
